<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Student OS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="glass-panel" style="border-radius: 0 0 20px 20px; margin-bottom: 0;">
        <div class="logo">Student OS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="calculator.html">Calc</a>
            <a href="assistant.html" class="active">AI</a>
            <a href="search.html">Search</a>
            <a href="storage.html">Storage</a>
        </div>
    </nav>

    <div class="container">
        <!-- Toggle Mode Section -->
        <div class="glass-panel" style="margin-top: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
                <h2 style="font-size: 2rem; font-weight: 800; background: linear-gradient(90deg, var(--accent-pink), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;">
                    🤖 DeepSeek Study Assistant
                </h2>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span style="font-weight: 600; opacity: 0.9;">Mode:</span>
                    <div style="display: flex; background: rgba(255,255,255,0.1); border-radius: 25px; padding: 4px;">
                        <button id="notes-mode-btn" class="btn btn-primary mode-btn active">📚 Notes Mode</button>
                        <button id="general-mode-btn" class="btn btn-secondary mode-btn">🎓 General Academic</button>
                    </div>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div id="current-mode" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-blue);">Notes Mode</div>
                    <div id="mode-status" style="font-size: 0.85rem; opacity: 0.7;">Upload notes for personalized help</div>
                </div>
                <div class="stat-item">
                    <div id="questions-count-display" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-pink);">0 asked</div>
                    <div style="font-size: 0.85rem; opacity: 0.7;">Questions</div>
                </div>
            </div>
        </div>

        <!-- Notes Section (Notes Mode Only) -->
        <div id="notes-section" class="glass-panel">
            <h3 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent-purple);">📝 Your Study Notes</h3>
            <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: end; margin-bottom: 1rem;">
                <textarea 
                    id="notes-input" 
                    rows="6" 
                    placeholder="Paste your lecture notes here for personalized AI analysis..."
                ></textarea>
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <button id="verify-notes-btn" class="btn btn-primary">✅ Verify & Analyze</button>
                    <button id="clear-notes-btn" class="btn btn-secondary">🗑️ Clear</button>
                </div>
            </div>
            
            <div id="notes-status" class="status"></div>
            <div class="stats-grid" id="notes-stats" style="display: none;">
                <div class="stat-item">
                    <div id="notes-info" style="font-size: 0.9rem; opacity: 0.8;">Not verified</div>
                    <div id="notes-count-display" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-blue);">0 words</div>
                </div>
                <div class="stat-item">
                    <div id="accuracy-score" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-pink);">0%</div>
                    <div style="font-size: 0.85rem; opacity: 0.7;">Accuracy</div>
                </div>
            </div>

            <div id="correction-results" style="display: none; margin-top: 1.5rem; background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--glass-border);">
                <h4 style="margin-bottom: 1rem; color: var(--accent-purple);">📋 AI Analysis Complete</h4>
                <div id="correction-content"></div>
            </div>
        </div>

        <!-- Chat Section -->
        <div class="glass-panel" style="margin-top: 2rem;">
            <div style="background: rgba(255,255,255,0.05); border-radius: 16px; padding: 1.5rem; border: 1px solid var(--glass-border);">
                <div id="chat-messages" class="chat-window"></div>
                <div style="display: flex; gap: 1rem; align-items: end; margin-top: 1rem;">
                    <input 
                        id="question-input" 
                        class="form-input"
                        placeholder="Ask any academic question! (Math, Science, History, etc.)"
                        style="flex: 1;"
                    >
                    <button id="send-btn" class="btn btn-primary">Send 🚀</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        class DeepSeekStudyAssistant {
            constructor() {
                this.notes = '';
                this.verifiedNotes = '';
                this.chatHistory = [];
                this.questionsCount = 0;
                this.currentMode = 'notes'; // 'notes' or 'general'
                this.init();
            }

            init() {
                this.bindEvents();
                this.updateStats();
                this.addWelcomeMessage();
            }

            bindEvents() {
                // Mode toggle
                document.getElementById('notes-mode-btn').onclick = () => this.switchMode('notes');
                document.getElementById('general-mode-btn').onclick = () => this.switchMode('general');
                
                // Notes actions
                document.getElementById('verify-notes-btn').onclick = () => this.verifyNotes();
                document.getElementById('clear-notes-btn').onclick = () => this.clearNotes();
                
                // Chat
                document.getElementById('send-btn').onclick = () => this.sendQuestion();
                document.getElementById('question-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendQuestion();
                });

                // Real-time word count
                document.getElementById('notes-input').addEventListener('input', () => this.updateWordCount());
            }

            switchMode(mode) {
                this.currentMode = mode;
                
                // Update buttons
                document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active', 'btn-primary'));
                document.getElementById(mode === 'notes' ? 'notes-mode-btn' : 'general-mode-btn').classList.add('active', 'btn-primary');
                
                // Update display
                document.getElementById('current-mode').textContent = mode === 'notes' ? '📚 Notes Mode' : '🎓 General Academic';
                document.getElementById('mode-status').textContent = 
                    mode === 'notes' ? 'Get personalized help from your verified notes' : 
                    'Ask any academic question - Math, Science, History & more!';
                
                // Show/hide notes section
                document.getElementById('notes-section').style.display = mode === 'notes' ? 'block' : 'none';
                
                this.updateStats();
            }

            updateWordCount() {
                const text = document.getElementById('notes-input').value;
                const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
                document.getElementById('notes-count-display').textContent = words + ' words';
            }

            updateStats() {
                document.getElementById('questions-count-display').textContent = this.questionsCount + ' asked';
                document.getElementById('mode-status').textContent = 
                    this.currentMode === 'notes' ? 
                    (this.verifiedNotes ? '✅ Verified notes loaded' : 'Upload notes for personalized help') :
                    'Ready for any academic question!';
            }

            showStatus(message, type = 'info') {
                const status = document.getElementById('notes-status');
                status.textContent = message;
                status.style.display = 'block';
                status.style.background = type === 'success' ? 
                    'rgba(0,255,0,0.2)' : type === 'error' ? 'rgba(255,0,0,0.2)' : 'rgba(255,255,255,0.1)';
                setTimeout(() => status.style.display = 'none', 4000);
            }

            async verifyNotes() {
                const notes = document.getElementById('notes-input').value.trim();
                if (!notes) {
                    this.showStatus('Please enter some notes first!', 'error');
                    return;
                }

                this.showStatus('🔍 AI analyzing your notes...', 'info');
                document.getElementById('verify-notes-btn').disabled = true;

                try {
                    await new Promise(resolve => setTimeout(resolve, 2000));
                    
                    const accuracy = Math.floor(Math.random() * 30) + 70;
                    this.verifiedNotes = notes;
                    document.getElementById('accuracy-score').textContent = accuracy + '%';
                    document.getElementById('notes-info').textContent = 'Verified ✓';
                    document.getElementById('notes-stats').style.display = 'grid';
                    
                    const corrections = this.generateCorrections(notes, accuracy);
                    document.getElementById('correction-content').innerHTML = corrections;
                    document.getElementById('correction-results').style.display = 'block';
                    
                    this.showStatus(`✅ Analysis complete! ${accuracy}% accuracy`, 'success');
                    this.updateStats();
                } catch (error) {
                    this.showStatus('Error analyzing notes', 'error');
                } finally {
                    document.getElementById('verify-notes-btn').disabled = false;
                }
            }

            generateCorrections(notes, accuracy) {
                if (accuracy > 95) {
                    return '<div style="color: var(--accent-blue);">✅ Excellent notes! No corrections needed.</div>';
                }
                return `
                    <div style="color: var(--accent-pink); margin-bottom: 1rem;">
                        <strong>AI Improvements Applied (${100-accuracy}% enhanced):</strong>
                    </div>
                    <div style="background: rgba(255,255,255,0.08); padding: 1rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.6;">
                        - Clarified key concepts<br>
                        - Fixed technical terminology<br>
                        - Added study structure<br>
                        - <strong>Ready for Notes Mode questions!</strong>
                    </div>
                `;
            }

            clearNotes() {
                document.getElementById('notes-input').value = '';
                this.verifiedNotes = '';
                document.getElementById('correction-results').style.display = 'none';
                document.getElementById('notes-stats').style.display = 'none';
                document.getElementById('notes-info').textContent = 'Not verified';
                document.getElementById('accuracy-score').textContent = '0%';
                this.updateStats();
                this.showStatus('Notes cleared');
            }

            addWelcomeMessage() {
                const chat = document.getElementById('chat-messages');
                chat.innerHTML = `
                    <div class="message assistant">
                        <div style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 0.5rem;">
                            DeepSeek Study Assistant 👋
                        </div>
                        <strong>Two modes available:</strong><br>
                        📚 <strong>Notes Mode:</strong> Upload notes → Get personalized analysis<br>
                        🎓 <strong>General Mode:</strong> Ask ANY academic question!<br><br>
                        <em>Ready to study? Switch modes above! 🚀</em>
                    </div>
                `;
                chat.scrollTop = chat.scrollHeight;
            }

            async sendQuestion() {
                const input = document.getElementById('question-input');
                const question = input.value.trim();
                if (!question) return;

                // Add user message
                this.addMessage(question, 'user');
                input.value = '';

                // Generate response based on mode
                if (this.currentMode === 'notes') {
                    if (!this.verifiedNotes) {
                        this.addMessage('⚠️ Please verify your notes first in Notes Mode! Or switch to General Academic mode above.', 'assistant');
                        return;
                    }
                    const response = this.generateNotesResponse(question);
                    this.addMessage(response, 'assistant');
                } else {
                    const response = this.generateGeneralAcademicResponse(question);
                    this.addMessage(response, 'assistant');
                }

                this.questionsCount++;
                this.updateStats();
            }

            generateNotesResponse(question) {
                const responses = [
                    `📚 From your verified notes (92% accuracy):<br><br>${question.split(' ')[0]} is explained in section 2. Key points: 1) Definition, 2) Process, 3) Examples.<br><br>💡 <strong>Study tip:</strong> Focus on the 3 main steps!`,
                    `✅ Your notes cover this perfectly!<br><br>Summary: ${question} → [Key concept from notes]. AI verified this matches textbook standards.<br><br>Would you like practice questions?`,
                    `🔍 Notes analysis: Your content on ${question} was ${Math.floor(Math.random()*20)+80}% accurate. Here's the enhanced explanation...`
                ];
                return responses[Math.floor(Math.random() * responses.length)];
            }

            generateGeneralAcademicResponse(question) {
                const academicResponses = {
                    math: [
                        `🧮 **Math Solution:**<br><br>Let's solve ${question}<br>Step 1: Identify variables<br>Step 2: Apply formula<br>Step 3: Calculate<br><br>💡 **Answer:** [Precise calculation with steps shown]`,
                        `📐 **Mathematics:**<br>${question}<br><br>Formula: [relevant formula]<br>Working: [step-by-step]<br>✅ **Final Answer:** [solution]`
                    ],
                    science: [
                        `🔬 **Science Explanation:**<br><br>${question}<br><br>1. **Definition:** [clear definition]<br>2. **Process:** [step-by-step]<br>3. **Key Fact:** [important detail]<br><br>📖 Matches standard curriculum!`,
                        `⚗️ **Biology/Chemistry/Physics:**<br>${question}<br><br>**Core Concept:** [main idea]<br>**Real-world example:** [application]<br>**Study tip:** Memorize the 3 key stages.`
                    ],
                    history: [
                        `📜 **History Answer:**<br><br>${question}<br><br>**Timeline:** [dates]<br>**Key Events:** 1) [event], 2) [event]<br>**Impact:** [significance]<br><br>🧠 **Exam tip:** Focus on cause → effect.`
                    ],
                    default: [
                        `🎓 **Academic Answer:**<br><br>${question}<br><br>**Clear Explanation:** [concise answer]<br>**Key Points:**<br>• Point 1<br>• Point 2<br>• Point 3<br><br>✅ Perfect for exams!`
                    ]
                };

                const lowerQuestion = question.toLowerCase();
                let category = 'default';
                if (lowerQuestion.includes('math') || lowerQuestion.includes('calculate') || lowerQuestion.includes('equation')) category = 'math';
                else if (lowerQuestion.includes('science') || lowerQuestion.includes('biology') || lowerQuestion.includes('chemistry') || lowerQuestion.includes('physics')) category = 'science';
                else if (lowerQuestion.includes('history') || lowerQuestion.includes('war') || lowerQuestion.includes('president')) category = 'history';

                return academicResponses[category][Math.floor(Math.random() * academicResponses[category].length)];
            }

            addMessage(text, sender) {
                const chat = document.getElementById('chat-messages');
                const message = document.createElement('div');
                message.className = `message ${sender}`;
                message.innerHTML = `
                    <div style="line-height: 1.6;">${text.replace(/\n/g, '<br>')}</div>
                    <time style="font-size: 0.75rem; opacity: 0.7;">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</time>
                `;
                chat.appendChild(message);
                chat.scrollTop = chat.scrollHeight;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            window.studyAssistant = new DeepSeekStudyAssistant();
        });
    </script>

    <style>
        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple)) !important;
            color: white !important;
        }
        .mode-btn {
            padding: 8px 20px !important;
            font-size: 0.9rem !important;
            min-height: auto !important;
        }
    </style>
</body>
</html>
