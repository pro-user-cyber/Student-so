<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Student OS</title>
    <style>
        :root {
            --accent-pink: #ff6b9d;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: var(--text-primary);
            padding-bottom: 2rem;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            padding: 0.5rem 1rem;
            border-radius: 8px;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .mode-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .mode-buttons {
            display: flex;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 4px;
            gap: 4px;
        }

        .mode-btn {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            min-height: auto;
            flex: 1;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: var(--text-secondary);
        }

        .mode-btn.active, .mode-btn:hover {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 1rem;
            border-radius: 12px;
        }

        .chat-window {
            height: 450px;
            overflow-y: auto;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            background: rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
        }

        .message {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            align-self: flex-end;
            border-bottom-right-radius: 6px;
        }

        .message.assistant {
            background: rgba(255,255,255,0.12);
            align-self: flex-start;
            border-bottom-left-radius: 6px;
        }

        .message-sender {
            font-size: 0.8rem;
            opacity: 0.8;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-input-group {
            display: flex;
            gap: 1rem;
            align-items: end;
        }

        #chatInput, #notes-input {
            flex: 1;
            min-height: 50px;
            resize: vertical;
            background: rgba(255,255,255,0.08);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            padding: 1rem;
            font-size: 1rem;
            font-family: inherit;
        }

        #chatInput:focus, #notes-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            border: 2px solid var(--glass-border);
        }

        .notes-input-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: end;
            margin-bottom: 1rem;
        }

        #notes-input {
            min-width: 300px;
            min-height: 150px;
        }

        .notes-results {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            display: none;
        }

        .notes-results.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .notes-results h4 {
            color: var(--accent-green);
            margin-bottom: 0.75rem;
        }

        .status {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            font-weight: 500;
        }

        .status.info { display: block; background: rgba(59,130,246,0.2); color: #3b82f6; }
        .status.success { display: block; background: rgba(16,185,129,0.2); color: #10b981; }
        .status.error { display: block; background: rgba(239,68,68,0.2); color: #ef4444; }
        .status.loading { display: block; background: rgba(168,85,247,0.2); color: #a855f7; }

        .chat-header {
            margin-bottom: 1rem;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .ai-badge {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 12px 18px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); }
        }

        @media (max-width: 768px) {
            .chat-window { height: 350px; }
            .chat-input-group, .notes-input-group { flex-direction: column; }
            .mode-toggle { flex-direction: column; align-items: flex-start; }
            nav { flex-direction: column; text-align: center; }
            .nav-links { justify-content: center; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Student OS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="calculator.html">Calc</a>
            <a href="assistant.html" class="active">AI</a>
            <a href="search.html">Search</a>
            <a href="storage.html">Storage</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-panel" style="margin-top: 2rem;">
            <div class="mode-toggle">
                <h1>🤖 AI Study Assistant</h1>
                <div>
                    <span style="font-weight: 600; opacity: 0.9; margin-right: 1rem;">Mode:</span>
                    <div class="mode-buttons">
                        <button id="general-mode-btn" class="mode-btn active">💬 Live Chat</button>
                        <button id="notes-mode-btn" class="mode-btn">📝 Notes Helper</button>
                    </div>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div id="current-mode-display" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-blue);">💬 Live Chat</div>
                    <div id="mode-description" style="font-size: 0.9rem; opacity: 0.8;">AI runs locally in your browser</div>
                </div>
                <div class="stat-item">
                    <div id="session-stats" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-purple);">⏳ Loading...</div>
                    <div style="font-size: 0.85rem; opacity: 0.7;" id="connection-status">Downloading AI model...</div>
                </div>
            </div>
        </div>

        <div id="notes-section" class="glass-panel" style="display: none;">
            <h3 style="font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent-purple);">📚 AI Notes Analysis</h3>
            <div class="notes-input-group">
                <textarea id="notes-input" rows="6" placeholder="Paste your lecture notes here... AI will analyze for accuracy, suggest improvements, and create study summaries"></textarea>
                <div style="display: flex; flex-direction: column; gap: 0.75rem; min-width: 160px;">
                    <button id="analyze-btn" class="btn btn-primary" disabled>🔍 Analyze Notes</button>
                    <button id="clear-btn" class="btn btn-secondary">🗑️ Clear</button>
                </div>
            </div>
            <div id="notes-status" class="status"></div>
            <div id="notes-results" class="notes-results">
                <h4>📋 Analysis Results</h4>
                <div id="notes-content"></div>
            </div>
        </div>

        <div class="glass-panel">
            <div class="chat-header">
                <strong>💬 AI Live Chat</strong>
                <span class="ai-badge">🧠 Phi-3.5 Mini</span>
            </div>
<div class="stat-item">
    <button id="reset-btn" class="btn btn-secondary" style="font-size: 0.85rem; padding: 8px 16px;">
        🔄 Reset AI
    </button>
</div>
            
            <div id="chatMessages" class="chat-window"></div>
            
            <form id="chatForm" class="chat-input-group">
                <input type="text" id="chatInput" placeholder="Ask about math, science, history, coding..." autocomplete="off">
                <button type="submit" id="sendBtn" class="btn btn-primary" disabled>Send</button>
            </form>
            
            <div id="chat-status" class="status"></div>
        </div>
    </div>

    <script type="module">
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm@0.2.6";

        // Global variables
        let engine = null;
        let isReady = false;
        let currentMode = 'general';
        let messageCount = 0;

        // DOM Elements
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatForm = document.getElementById('chatForm');
        const sendBtn = document.getElementById('sendBtn');
        const notesInput = document.getElementById('notes-input');
        const notesBtn = document.getElementById('analyze-btn');
        const clearBtn = document.getElementById('clear-btn');
        const chatStatus = document.getElementById('chat-status');
        const notesStatus = document.getElementById('notes-status');
        const notesResults = document.getElementById('notes-results');
        const notesContent = document.getElementById('notes-content');
        const sessionStats = document.getElementById('session-stats');
        const connectionStatus = document.getElementById('connection-status');
        const currentModeDisplay = document.getElementById('current-mode-display');
        const modeDescription = document.getElementById('mode-description');

        // Status display function
        function showStatus(elementId, message, type) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.textContent = message;
            el.className = 'status ' + type;
        }

        // Add message to chat window
        function addMessage(type, text) {
            if (!chatMessages) return;
            
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `<div class="message-sender">${type === 'user' ? 'You' : 'AI'}</div>${text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            messageCount++;
            return div;
        }

        // Show typing indicator
        function showTyping() {
            if (!chatMessages) return;
            
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typing-indicator';
            div.innerHTML = `
                <div class="message-sender">AI</div>
                <div class="typing-indicator">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Hide typing indicator
        function hideTyping() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        // Switch between modes
        function switchMode(mode) {
            currentMode = mode;
            const chatSection = chatForm ? chatForm.closest('.glass-panel') : null;
            const notesSection = document.getElementById('notes-section');
            
            const generalBtn = document.getElementById('general-mode-btn');
            const notesBtnMode = document.getElementById('notes-mode-btn');
            
            if (generalBtn) generalBtn.classList.toggle('active', mode === 'general');
            if (notesBtnMode) notesBtnMode.classList.toggle('active', mode === 'notes');
            
            if (mode === 'notes') {
                if (notesSection) notesSection.style.display = 'block';
                if (chatSection) chatSection.style.display = 'none';
                if (currentModeDisplay) currentModeDisplay.textContent = '📝 Notes Helper';
                if (modeDescription) modeDescription.textContent = 'Paste notes for AI analysis';
            } else {
                if (notesSection) notesSection.style.display = 'none';
                if (chatSection) chatSection.style.display = 'block';
                if (currentModeDisplay) currentModeDisplay.textContent = '💬 Live Chat';
                if (modeDescription) modeDescription.textContent = 'AI runs locally in your browser';
            }
        }

        // Initialize AI Model
        async function initAI() {
            showStatus('chat-status', '🔄 Downloading AI model (30-80MB)...', 'loading');

            try {
                engine = await CreateMLCEngine(
                    "Phi-3.5-mini-instruct-q4f16_1-MLC",
                    {
                        initProgressCallback: (progress) => {
                            const percent = (progress * 100).toFixed(0);
                            if (sessionStats) {
                                sessionStats.textContent = `📥 ${percent}%`;
                                sessionStats.style.color = '#a855f7';
                            }
                            if (connectionStatus) connectionStatus.textContent = 'Downloading model...';
                            showStatus('chat-status', `🔄 Loading AI: ${percent}%`, 'loading');
                        }
                    }
                );

                isReady = true;
                if (sessionStats) {
                    sessionStats.textContent = '🟢 Ready';
                    sessionStats.style.color = '#10b981';
                }
                if (connectionStatus) connectionStatus.textContent = 'AI running locally';
                showStatus('chat-status', '🟢 AI Ready! Ask me anything.', 'success');
                
                if (sendBtn) sendBtn.disabled = false;
                if (notesBtn) notesBtn.disabled = false;

                addMessage('assistant', '🚀 AI Study Assistant ready! Ask me about math, science, history, coding, or any subject. You can also switch to Notes Helper mode to analyze your lecture notes!');

            } catch (error) {
                console.error('AI Init Error:', error);
                if (sessionStats) {
                    sessionStats.textContent = '❌ Error';
                    sessionStats.style.color = '#ef4444';
                }
                if (connectionStatus) connectionStatus.textContent = error.message;
                showStatus('chat-status', '❌ Failed to load AI: ' + error.message, 'error');
            }
        }

        // Handle chat submission
        async function handleChat(e) {
            e.preventDefault();
            if (!chatInput || !engine || !isReady) return;
            
            const userMessage = chatInput.value.trim();
            if (!userMessage) return;

            chatInput.value = '';
            addMessage('user', userMessage);
            showTyping();

            try {
                const messages = [
                    { role: "system", content: "You are a helpful AI study assistant. Give clear, educational answers. Format with bullet points when appropriate." },
                    { role: "user", content: userMessage }
                ];

                const chunks = await engine.chat.completions.create(
                    messages,
                    { temperature: 0.7, max_tokens: 512 }
                );

                hideTyping();
                const response = chunks.choices[0]?.message?.content || 'Sorry, I could not generate a response.';
                addMessage('assistant', response);

            } catch (error) {
                hideTyping();
                addMessage('assistant', '❌ Error: ' + error.message);
            }
        }

        // Handle notes analysis
        async function analyzeNotes() {
            if (!notesInput || !engine || !isReady) return;
            
            const notes = notesInput.value.trim();
            if (!notes) return;

            showStatus('notes-status', '🔄 Analyzing your notes...', 'loading');
            if (notesBtn) notesBtn.disabled = true;

            try {
                const prompt = `Analyze these study notes and provide:
1. A brief summary (2-3 sentences)
2. Key concepts to remember
3. Any errors or misconceptions
4. Suggestions for improvement

Notes: ${notes}`;

                const messages = [
                    { role: "system", content: "You are a helpful AI study assistant. Analyze the notes and provide structured feedback." },
                    { role: "user", content: prompt }
                ];

                const chunks = await engine.chat.completions.create(
                    messages,
                    { temperature: 0.7, max_tokens: 800 }
                );

                const response = chunks.choices[0]?.message?.content || 'No analysis generated.';
                
                if (notesContent) {
                    notesContent.innerHTML = response.replace(/\n/g, '<br>').replace(/•/g, '•');
                }
                if (notesResults) notesResults.classList.add('show');
                showStatus('notes-status', '✅ Analysis complete!', 'success');

            } catch (error) {
                showStatus('notes-status', '❌ Error: ' + error.message, 'error');
            } finally {
                if (notesBtn) notesBtn.disabled = false;
            }
        }

        // Clear notes
        function clearNotes() {
            if (notesInput) notesInput.value = '';
            if (notesResults) notesResults.classList.remove('show');
            if (notesContent) notesContent.innerHTML = '';
            showStatus('notes-status', '', '');
        }

        // Setup event listeners
        function setupEventListeners() {
            // Mode buttons
            const generalBtn = document.getElementById('general-mode-btn');
            const notesBtnMode = document.getElementById('notes-mode-btn');
            
            if (generalBtn) {
                generalBtn.addEventListener('click', () => switchMode('general'));
            }
            if (notesBtnMode) {
                notesBtnMode.addEventListener('click', () => switchMode('notes'));
            }
            
            // Chat form
            if (chatForm) {
                chatForm.addEventListener('submit', handleChat);
            }
            
            // Notes buttons
            if (notesBtn) {
                notesBtn.addEventListener('click', analyzeNotes);
            }
            if (clearBtn) {
                clearBtn.addEventListener('click', clearNotes);
            }
        }

        // Initialize everything
        function init() {
            console.log('🤖 Student OS AI Assistant initializing...');
            setupEventListeners();
            initAI();
        }

        // Start when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        // Export functions for external use if needed
        window.StudentOS_AI = {
            switchMode,
            handleChat,
            analyzeNotes,
            clearNotes,
            isReady: () => isReady
        };
    </script>
</body>
</html>
