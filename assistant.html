<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Student OS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --accent-pink: #ff6b9d;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
        }

        .mode-toggle {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 2rem; 
            flex-wrap: wrap; 
            gap: 1rem;
        }
        .mode-buttons {
            display: flex; 
            background: rgba(255,255,255,0.1); 
            border-radius: 25px; 
            padding: 4px; 
            gap: 4px;
        }
        .mode-btn {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            min-height: auto;
            flex: 1;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.4);
        }
        .ai-chat-frame {
            width: 100%; 
            height: 500px; 
            border: 1px solid var(--glass-border); 
            border-radius: 16px; 
            background: rgba(0,0,0,0.3);
        }
        .notes-input-group {
            display: flex; 
            gap: 1rem; 
            flex-wrap: wrap; 
            align-items: end; 
            margin-bottom: 1rem;
        }
        .notes-actions {
            display: flex; 
            flex-direction: column; 
            gap: 0.75rem; 
            min-width: 160px;
        }
        #notes-input {
            flex: 1;
            min-width: 300px;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            transition: border-color 0.3s;
        }
        #notes-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .chat-header {
            margin-bottom: 1rem; 
            padding: 1rem; 
            background: rgba(255,255,255,0.05); 
            border-radius: 12px; 
            border: 1px solid var(--glass-border);
        }
        .status {
            display: none;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-weight: 500;
        }
        @media (max-width: 768px) {
            .ai-chat-frame { height: 400px; }
            .notes-input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="glass-panel" style="border-radius: 0 0 20px 20px; margin-bottom: 0;">
        <div class="logo">Student OS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="calculator.html">Calc</a>
            <a href="assistant.html" class="active">AI</a>
            <a href="search.html">Search</a>
            <a href="storage.html">Storage</a>
        </div>
    </nav>

    <div class="container">
        <!-- Mode Toggle & Stats -->
        <div class="glass-panel" style="margin-top: 2rem;">
            <div class="mode-toggle">
                <h1 style="font-size: 2.2rem; font-weight: 800; background: linear-gradient(90deg, var(--accent-pink), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;">
                    🤖 DeepSeek AI Study Assistant
                </h1>
                <div>
                    <span style="font-weight: 600; opacity: 0.9; margin-right: 1rem;">Mode:</span>
                    <div class="mode-buttons">
                        <button id="general-mode-btn" class="btn btn-primary mode-btn active">🎓 General Chat</button>
                        <button id="notes-mode-btn" class="btn btn-secondary mode-btn">📝 Notes Helper</button>
                    </div>
                </div>
            </div>
            
            <div class="stats-grid">
                <div class="stat-item">
                    <div id="current-mode-display" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-blue);">🎓 General Chat</div>
                    <div id="mode-description" style="font-size: 0.9rem; opacity: 0.8;">Ask any academic question instantly</div>
                </div>
                <div class="stat-item">
                    <div id="session-stats" style="font-size: 1.5rem; font-weight: 800; color: var(--accent-pink);">Active</div>
                    <div style="font-size: 0.85rem; opacity: 0.7;">AI Session</div>
                </div>
            </div>
        </div>

        <!-- Notes Verification Section (Hidden by default) -->
        <div id="notes-section" class="glass-panel" style="display: none; margin-top: 2rem;">
            <h3 style="font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent-purple);">📚 AI Notes Verification</h3>
            <div class="notes-input-group">
                <textarea 
                    id="notes-input" 
                    rows="6" 
                    placeholder="Paste your study notes here... DeepSeek AI will verify accuracy + provide corrections"
                ></textarea>
                <div class="notes-actions">
                    <button id="verify-btn" class="btn btn-primary">🔍 AI Verify Notes</button>
                    <button id="clear-btn" class="btn btn-secondary">🗑️ Clear</button>
                </div>
            </div>
            
            <div id="verification-status" class="status"></div>
        </div>

        <!-- DeepSeek Chatbot -->
        <div class="glass-panel" style="margin-top: 2rem;">
            <div class="chat-header">
                <strong>💬 DeepSeek AI Chat</strong> - Strict academic focus only. No off-topic conversations.
            </div>
            <iframe 
                id="deepseek-chat" 
                class="ai-chat-frame"
                src="https://chat.deepseek.com?c=You%20are%20a%20strict%20academic%20tutor.%20ONLY%20answer%20study-related%20questions%20about%20Math%2C%20Science%2C%20History%2C%20Languages%2C%20etc.%20NEVER%20discuss%20non-academic%20topics.%20Act%20like%20a%20serious%20teacher.%20If%20asked%20about%20non-study%20topics%2C%20say%3A%20%22Please%20ask%20an%20academic%20question.%20I'm%20here%20for%20your%20studies%20only!%22%20Always%20provide%20detailed%2C%20accurate%20explanations%20with%20examples.%20Structure%20answers%20clearly%3A%201.%20Explanation%202.%20Examples%203.%20Study%20tips."
            ></iframe>
        </div>
    </div>

    <script>
        class StudentOSAI {
            constructor() {
                this.currentMode = 'general';
                this.init();
            }

            init() {
                this.bindEvents();
                this.updateModeDisplay();
            }

            bindEvents() {
                document.getElementById('general-mode-btn').onclick = () => this.switchMode('general');
                document.getElementById('notes-mode-btn').onclick = () => this.switchMode('notes');
                document.getElementById('verify-btn').onclick = () => this.verifyNotesWithAI();
                document.getElementById('clear-btn').onclick = () => this.clearNotes();
                
                document.getElementById('notes-input').addEventListener('input', (e) => {
                    e.target.style.borderColor = e.target.value.trim() ? 'var(--accent-blue)' : 'var(--glass-border)';
                });
            }

            // ✅ FIXED: No more infinite recursion
            switchMode(mode) {
                this.currentMode = mode;
                
                // Update button states
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.remove('btn-primary', 'active');
                    btn.classList.add('btn-secondary');
                });
                document.getElementById(mode === 'general' ? 'general-mode-btn' : 'notes-mode-btn')
                    .classList.add('btn-primary', 'active');
                
                this.updateModeDisplay();
                document.getElementById('notes-section').style.display = mode === 'notes' ? 'block' : 'none';
            }

            updateModeDisplay() {
                const displays = {
                    general: { title: '🎓 General Chat', desc: 'Ask any academic question instantly' },
                    notes: { title: '📝 Notes + AI Verification', desc: 'Upload notes → Get AI accuracy check + corrections' }
                };
                
                const display = displays[this.currentMode];
                document.getElementById('current-mode-display').textContent = display.title;
                document.getElementById('mode-description').textContent = display.desc;
                document.getElementById('session-stats').textContent = 'Active';
            }

            // ✅ FIXED: Mode switch happens HERE, not in switchMode()
            async verifyNotesWithAI() {
                const notes = document.getElementById('notes-input').value.trim();
                if (!notes) {
                    this.showVerificationStatus('Paste notes first bro', 'error');
                    return;
                }

                const verifyBtn = document.getElementById('verify-btn');
                verifyBtn.disabled = true;
                verifyBtn.textContent = '🔍 Loading AI...';

                const prompt = encodeURIComponent(
                    `You are an academic AI. Analyze these notes and:
1. Check accuracy
2. Correct mistakes  
3. Improve clarity
4. Give final improved version

NOTES:
${notes}`
                );

                const iframe = document.getElementById('deepseek-chat');

                // Load AI with notes analysis prompt
                iframe.src = `https://chat.deepseek.com?c=${prompt}`;

                // 👇 Mode switch happens HERE (no recursion)
                this.currentMode = 'general';
                this.updateModeDisplay();
                document.getElementById('notes-section').style.display = 'none';

                this.showVerificationStatus(
                    'AI loaded with your notes. Press Enter in chat to get results.',
                    'success'
                );

                // Reset button
                setTimeout(() => {
                    verifyBtn.disabled = false;
                    verifyBtn.textContent = '🔍 AI Verify Notes';
                }, 2000);
            }

            showVerificationStatus(message, type) {
                const status = document.getElementById('verification-status');
                status.textContent = message;
                status.style.display = 'block';
                status.style.background = type === 'success' ? 'rgba(0,200,0,0.2)' : 
                                        type === 'error' ? 'rgba(255,100,100,0.2)' : 'rgba(100,150,255,0.2)';
                setTimeout(() => status.style.display = 'none', 5000);
            }

            clearNotes() {
                document.getElementById('notes-input').value = '';
                document.getElementById('verification-status').style.display = 'none';
                document.getElementById('notes-input').style.borderColor = 'var(--glass-border)';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new StudentOSAI();
        });
    </script>
</body>
</html>
