<div class="container">

    <div class="glass-panel">

        <h1 style="margin-bottom: 1rem;">
            Student OS AI
        </h1>

        <p style="
            color: var(--text-muted);
            margin-bottom: 2rem;
        ">
            Powered by Gemma3 locally using Ollama
        </p>

        <!-- CHAT WINDOW -->
        <div id="chatWindow" class="chat-window">

            <div class="message assistant">
                Hello. I am trapped inside your GPU now.
            </div>

        </div>

        <!-- INPUT AREA -->
        <div class="input-group" style="
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        ">

            <input
                type="text"
                id="userInput"
                class="form-input"
                placeholder="Ask something..."
                style="flex: 1;"
            >

            <input
                type="file"
                id="fileInput"
                class="form-input"
                style="
                    max-width: 250px;
                    padding: 12px !important;
                "
            >

            <button
                class="btn btn-primary"
                onclick="sendMessage()"
            >
                Send
            </button>

        </div>

    </div>

</div>

<script>

async function sendMessage() {

    const input = document.getElementById("userInput")
    const fileInput = document.getElementById("fileInput")
    const chatWindow = document.getElementById("chatWindow")

    const message = input.value.trim()

    if (!message && !fileInput.files[0]) {
        return
    }

    // USER MESSAGE UI
    const userMessage = document.createElement("div")

    userMessage.className = "message user"

    userMessage.innerHTML = `
        ${message || "Uploaded a file"}
    `

    chatWindow.appendChild(userMessage)

    // FORM DATA
    const formData = new FormData()

    formData.append("message", message)

    if (fileInput.files[0]) {
        formData.append("file", fileInput.files[0])
    }

    // CLEAR INPUT
    input.value = ""

    // LOADING MESSAGE
    const loading = document.createElement("div")

    loading.className = "message assistant"

    loading.innerHTML = "Thinking..."

    chatWindow.appendChild(loading)

    chatWindow.scrollTop = chatWindow.scrollHeight

    try {

        const response = await fetch(
            " https://dubiously-latch-answering.ngrok-free.dev",
            {
                method: "POST",
                body: formData
            }
        )

        const data = await response.json()

        loading.remove()

        // AI MESSAGE
        const botMessage = document.createElement("div")

        botMessage.className = "message assistant"

        botMessage.innerHTML = data.reply

        chatWindow.appendChild(botMessage)

    }

    catch (err) {

        loading.remove()

        const errorMessage = document.createElement("div")

        errorMessage.className = "message assistant"

        errorMessage.innerHTML =
            "Backend connection failed."

        chatWindow.appendChild(errorMessage)

    }

    chatWindow.scrollTop = chatWindow.scrollHeight
}

</script>
