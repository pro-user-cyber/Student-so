<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student OS - Calculator</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root{--transition:all .2s cubic-bezier(.4,0,.2,1)}
        .container{max-width:500px;margin:2rem auto;padding:1rem;width:100%;box-sizing:border-box}
        .glass-panel{padding:2.5rem;border-radius:24px;box-shadow:0 20px 40px rgba(0,0,0,.4)}
        .calc-header{text-align:center;margin-bottom:2rem}
        .calc-title{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0 0 .5rem}
        .calc-mode{display:flex;gap:1rem;justify-content:center;margin-bottom:1.5rem;flex-wrap:wrap}
        .mode-btn{padding:.75rem 1.5rem;background:rgba(255,255,255,.08);border:1px solid var(--glass-border);color:var(--text-muted);border-radius:12px;cursor:pointer;font-weight:600;transition:var(--transition);font-size:.9rem;flex:1;min-width:100px;max-width:140px}
        .mode-btn.active,.mode-btn:hover{background:var(--accent-blue);color:#fff;border-color:var(--accent-blue);transform:translateY(-2px)}
        .calc-display{width:100%;height:80px;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid var(--glass-border);border-radius:16px;padding:0 1.5rem;font-size:2.2rem;font-weight:300;text-align:right;color:var(--text-main);letter-spacing:1px;margin-bottom:1.5rem;box-sizing:border-box;resize:none}
        .calc-grid{display:none;grid-template-columns:repeat(4,1fr);gap:12px}
        .calc-grid.active{display:grid}
        .calc-btn{height:64px;border:none;border-radius:16px;font-size:1.25rem;font-weight:600;cursor:pointer;transition:var(--transition);font-family:'Nunito',sans-serif;position:relative;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
        .calc-btn:active{transform:scale(.98)}
        .calc-btn.num{background:rgba(255,255,255,.15);color:var(--text-main)}
        .calc-btn.operator{background:rgba(126,184,234,.3);color:var(--accent-blue)}
        .calc-btn.function{background:rgba(161,140,209,.3);color:var(--accent-purple)}
        .calc-btn.constant{background:rgba(16,185,129,.3);color:#10b981}
        .calc-btn.equals{background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));color:#fff;grid-row:span 2;font-size:1.4rem;font-weight:800}
        .calc-btn.clear{background:rgba(239,68,68,.3);color:#ef4444}
        .calc-btn.clear:hover{background:rgba(239,68,68,.4)}
        .calc-btn.backspace{background:rgba(245,158,11,.3);color:#f59e0b}
        .calc-btn.zero{grid-column:span 2}
        .calc-btn.neg{background:rgba(59,130,246,.3);color:#3b82f6}
        @media(max-width:768px){
            .container{padding:1rem;margin:1rem auto;max-width:95vw}
            .glass-panel{padding:2rem 1.5rem}
            .calc-display{font-size:1.8rem;height:70px;padding:0 1rem}
            .calc-btn{height:56px;font-size:1.15rem}
            .calc-title{font-size:1.6rem}
            .mode-btn{min-width:90px;padding:.6rem 1rem;font-size:.85rem}
        }
        @media(max-width:480px){
            .container{padding:.75rem}
            .glass-panel{padding:1.5rem 1rem}
            .calc-display{font-size:1.6rem;height:65px}
            .calc-btn{height:52px;font-size:1.1rem}
            .calc-mode{gap:.5rem}
            .mode-btn{padding:.5rem .75rem;font-size:.8rem;min-width:80px}
        }
        @media(max-width:360px){
            .calc-display{font-size:1.4rem}
            .calc-btn{height:48px;font-size:1rem}
        }
    </style>
</head>
<body>
    <nav class="glass-panel" style="border-radius:0 0 20px 20px;margin-bottom:1rem;">
        <div class="logo">Student OS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="calculator.html" class="active">Calc</a>
            <a href="assistant.html">AI</a>
            <a href="search.html">Search</a>
            <a href="storage.html">Storage</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <div class="calc-header">
                <h1 class="calc-title">🧮 Calculator</h1>
                <p style="color:var(--text-muted);font-size:1rem;margin:0">Basic & Scientific</p>
            </div>

            <input type="text" id="calcDisplay" class="calc-display" readonly placeholder="0" value="0">

            <div class="calc-mode">
                <button class="mode-btn active" data-mode="basic">Basic</button>
                <button class="mode-btn" data-mode="scientific">Scientific</button>
            </div>

            <!-- Basic Mode -->
            <div id="basicGrid" class="calc-grid active">
                <button class="calc-btn clear" data-action="clearAll">AC</button>
                <button class="calc-btn backspace" data-action="backspace">⌫</button>
                <button class="calc-btn operator" data-action="divide">÷</button>
                <button class="calc-btn operator" data-action="multiply">×</button>
                <button class="calc-btn num" data-value="7">7</button>
                <button class="calc-btn num" data-value="8">8</button>
                <button class="calc-btn num" data-value="9">9</button>
                <button class="calc-btn operator" data-action="subtract">−</button>
                <button class="calc-btn num" data-value="4">4</button>
                <button class="calc-btn num" data-value="5">5</button>
                <button class="calc-btn num" data-value="6">6</button>
                <button class="calc-btn operator" data-action="add">+</button>
                <button class="calc-btn num" data-value="1">1</button>
                <button class="calc-btn num" data-value="2">2</button>
                <button class="calc-btn num" data-value="3">3</button>
                <button class="calc-btn equals" data-action="equals" style="grid-row: span 2; grid-column: span 2;"><i class="fas fa-equals"></i></button>
                <button class="calc-btn num zero" data-value="0">0</button>
                <button class="calc-btn num" data-value=".">.</button>
                <button class="calc-btn neg" data-action="negate">±</button>
            </div>

            <!-- Scientific Mode -->
            <div id="scientificGrid" class="calc-grid">
                <button class="calc-btn clear" data-action="clearAll">AC</button>
                <button class="calc-btn function" data-action="sin">sin</button>
                <button class="calc-btn function" data-action="cos">cos</button>
                <button class="calc-btn function" data-action="tan">tan</button>
                <button class="calc-btn num" data-value="(">(</button>
                <button class="calc-btn num" data-value=")">)</button>
                <button class="calc-btn function" data-action="log">log</button>
                <button class="calc-btn constant" data-value="π">π</button>
                <button class="calc-btn num" data-value="7">7</button>
                <button class="calc-btn num" data-value="8">8</button>
                <button class="calc-btn num" data-value="9">9</button>
                <button class="calc-btn operator" data-action="divide">÷</button>
                <button class="calc-btn num" data-value="4">4</button>
                <button class="calc-btn num" data-value="5">5</button>
                <button class="calc-btn num" data-value="6">6</button>
                <button class="calc-btn operator" data-action="multiply">×</button>
                <button class="calc-btn num" data-value="1">1</button>
                <button class="calc-btn num" data-value="2">2</button>
                <button class="calc-btn num" data-value="3">3</button>
                <button class="calc-btn operator" data-action="subtract">−</button>
                <button class="calc-btn num zero" data-value="0">0</button>
                <button class="calc-btn num" data-value=".">.</button>
                <button class="calc-btn operator" data-action="add">+</button>
                <button class="calc-btn equals" data-action="equals"><i class="fas fa-equals"></i></button>
                <button class="calc-btn neg" data-action="negate">±</button>
            </div>
        </div>
    </div>

    <script>
        class Calculator {
            constructor() {
                this.display = document.getElementById('calcDisplay');
                this.expression = '0'; // Full expression string
                this.resultMode = false;
                this.init();
            }

            init() {
                // Mode switching
                document.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.addEventListener('click', () => this.toggleMode(btn.dataset.mode));
                });
                
                // Button clicks
                document.querySelectorAll('.calc-btn').forEach(btn => {
                    btn.addEventListener('click', () => this.handleClick(btn));
                });
                
                // Keyboard support
                document.addEventListener('keydown', e => this.handleKey(e));
                
                this.updateDisplay();
            }

            toggleMode(mode) {
                document.querySelectorAll('.calc-grid').forEach(grid => {
                    grid.classList.toggle('active', grid.id === `${mode}Grid`);
                });
                document.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
            }

            handleClick(btn) {
                const value = btn.dataset.value;
                const action = btn.dataset.action;
                
                if (value !== undefined) {
                    this.append(value);
                } else if (action) {
                    this[action]();
                }
            }

            append(value) {
                if (this.resultMode) {
                    this.expression = this.resultMode.toString();
                    this.resultMode = false;
                }
                
                // Handle π
                if (value === 'π') {
                    value = Math.PI.toString();
                }
                
                // Prevent multiple decimals in current number
                const lastOpIndex = this.lastOperatorIndex();
                const currentNum = lastOpIndex === -1 ? this.expression : this.expression.slice(lastOpIndex + 1);
                if (value === '.' && currentNum.includes('.')) return;
                
                this.expression += value;
                this.updateDisplay();
            }

            clearAll() {
                this.expression = '0';
                this.resultMode = false;
                this.updateDisplay();
            }

            backspace() {
                if (this.expression === '0') return;
                this.expression = this.expression.slice(0, -1) || '0';
                this.resultMode = false;
                this.updateDisplay();
            }

            negate() {
                const lastOpIndex = this.lastOperatorIndex();
                const currentNum = lastOpIndex === -1 ? this.expression : this.expression.slice(lastOpIndex + 1);
                
                if (currentNum === '0') return;
                
                if (currentNum.startsWith('-')) {
                    this.expression = this.expression.slice(0, lastOpIndex + 1) + currentNum.slice(1);
                } else {
                    this.expression = this.expression.slice(0, lastOpIndex + 1) + '-' + currentNum;
                }
                this.updateDisplay();
            }

            // Safe eval with limited scope
            safeEval(expression) {
                // Replace × with * and ÷ with /
                let safeExpr = expression.replace(/×/g, '*').replace(/÷/g, '/');
                
                // Only allow safe math operations
                const allowed = /^[0-9+\-*/().πe\s]+$/;
                if (!allowed.test(safeExpr)) {
                    throw new Error('Invalid expression');
                }
                
                try {
                    // eslint-disable-next-line no-eval
                    const result = eval(safeExpr);
                    return isFinite(result) ? result : NaN;
                } catch {
                    return NaN;
                }
            }

            equals() {
                try {
                    const result = this.safeEval(this.expression);
                    if (isNaN(result)) {
                        return this.error();
                    }
                    
                    this.resultMode = result;
                    this.expression = result.toString();
                    this.updateDisplay();
                } catch {
                    this.error();
                }
            }

            // Trigonometric functions (degrees)
            sin() { this.unaryOperation(Math.sin, true); }
            cos() { this.unaryOperation(Math.cos, true); }
            tan() { this.unaryOperation(Math.tan, true); }

            log() {
                try {
                    const result = this.safeEval(this.expression);
                    if (result <= 0) return this.error();
                    this.resultMode = Math.log10(result);
                    this.expression = this.resultMode.toString();
                    this.updateDisplay();
                } catch {
                    this.error();
                }
            }

            unaryOperation(mathFn, toDegrees = false) {
                try {
                    let num = this.safeEval(this.expression);
                    if (isNaN(num)) return this.error();
                    
                    if (toDegrees) {
                        num = num * Math.PI / 180;
                    }
                    
                    this.resultMode = mathFn(num);
                    this.expression = this.resultMode.toString();
                    this.updateDisplay();
                } catch {
                    this.error();
                }
            }

            lastOperatorIndex() {
                const operators = ['+', '-', '*', '/', '×', '÷'];
                for (let i = this.expression.length - 1; i >= 0; i--) {
                    if (operators.includes(this.expression[i])) {
                        return i;
                    }
                }
                return -1;
            }

            error() {
                this.expression = 'Error';
                this.updateDisplay();
                setTimeout(() => {
                    if (this.expression === 'Error') this.clearAll();
                }, 1500);
            }

            updateDisplay() {
                let displayValue = this.expression;
                
                if (displayValue === 'Error') {
                    this.display.style.color = '#ef4444';
                } else {
                    this.display.style.color = 'var(--text-main)';
                    
                    // Clean up the display
                    try {
                        const num = parseFloat(displayValue);
                        if (!isNaN(num)) {
                            if (Math.abs(num) < 1e-10) {
                                displayValue = '0';
                            } else if (displayValue.length > 14) {
                                displayValue = num.toPrecision(10);
                            }
                        }
                    } catch {
                        // Keep original if parsing fails
                    }
                }
                
                this.display.value = displayValue;
            }

            handleKey(e) {
                // Number keys
                if (/[0-9]/.test(e.key)) {
                    this.append(e.key);
                }
                // Decimal
                if (e.key === '.') {
                    this.append('.');
                }
                // Parentheses
                if (e.key === '(' || e.key === ')') {
                    this.append(e.key);
                }
                // Operators
                if (['+', '-', '*', '/', '×', '÷'].includes(e.key)) {
                    if (e.key === '*') this.append('×');
                    else if (e.key === '/') this.append('÷');
                    else this.append(e.key);
                }
                // Equals
                if (e.key === 'Enter' || e.key === '=') {
                    e.preventDefault();
                    this.equals();
                }
                // Clear
                if (e.key === 'Escape') {
                    this.clearAll();
                }
                // Backspace
                if (e.key === 'Backspace') {
                    this.backspace();
                }
                // Negate
                if (e.key === 'n' || e.key === 'N') {
                    this.negate();
                }
            }
        }

        // Initialize calculator when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new Calculator();
        });
    </script>
</body>
</html>
