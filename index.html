<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Assistant - Student OS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav>
        <div class="logo">Student OS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="calculator.html">Calc</a>
            <a href="assistant.html" class="active">AI Assistant</a>
            <a href="search.html">Search</a>
            <a href="storage.html">Storage</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <h1 style="margin-bottom: 1rem; color: var(--accent-blue);">📚 Notes-Powered Study Assistant</h1>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">
                Paste your study notes on the left, ask questions on the right. 
                I'll find answers from YOUR notes instantly!
            </p>
        </div>

        <div class="glass-panel assistant-container">
            <!-- Notes Section -->
            <div class="notes-section">
                <h3>📝 Your Study Notes</h3>
                <textarea 
                    class="notes-textarea" 
                    id="notes-input" 
                    placeholder="Paste your lecture notes, textbook content, or study material here...
                    
Example:
Photosynthesis is the process where plants convert sunlight into energy.
It occurs in chloroplasts using chlorophyll.
Equation: 6CO2 + 6H2O → C6H12O6 + 6O2"
                ></textarea>
                <div style="margin-top: 1rem;">
                    <button class="btn btn-primary" onclick="saveNotes()">💾 Save Notes</button>
                    <button class="btn btn-secondary" onclick="clearNotes()" style="margin-left: 1rem;">🗑️ Clear</button>
                </div>
                <div id="notes-status" class="status" style="display: none;"></div>
            </div>

            <!-- Chat Section -->
            <div class="chat-container">
                <div class="chat-header">
                    <h3>💬 Ask Questions</h3>
                    <span id="notes-info" style="font-size: 0.85rem; color: var(--text-secondary);">No notes loaded</span>
                </div>
                
                <div class="chat-messages" id="chat-messages"></div>
                
                <div class="chat-input-container">
                    <input 
                        type="text" 
                        class="chat-input" 
                        id="question-input" 
                        placeholder="What is photosynthesis? →"
                    >
                    <button class="btn btn-primary" onclick="askQuestion()">Ask</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/assistant.js"></script>
</body>
</html>
