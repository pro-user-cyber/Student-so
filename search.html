<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Search - Student OS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo">Student OS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pomodoro.html">Pomodoro</a>
            <a href="calculator.html">Calc</a>
            <a href="assistant.html">AI</a>
            <a href="search.html" class="active">Search</a>
            <a href="storage.html">Storage</a>
        </div>
    </nav>

    <div class="container">
        <!-- Hero Section -->
        <div class="glass-panel" style="text-align: center; margin-bottom: 2rem;">
            <h1 style="color: var(--accent-blue); margin-bottom: 1rem;">🔍 Web Search</h1>
            <p style="color: var(--text-secondary);">Search the web without leaving Student OS</p>
        </div>

        <!-- Search Bar -->
        <div class="glass-panel" style="max-width: 700px; margin: 0 auto 2rem;">
            <div style="position: relative;">
                <input 
                    type="text" 
                    id="search-input" 
                    class="search-input" 
                    placeholder="Search anything... (works with DuckDuckGo)"
                    style="
                        width: 100%; 
                        padding: 18px 20px 18px 50px; 
                        font-size: 1.1rem;
                        border-radius: 30px;
                    "
                >
                <svg style="
                    position: absolute; 
                    left: 20px; 
                    top: 50%; 
                    transform: translateY(-50%); 
                    width: 24px; 
                    height: 24px; 
                    opacity: 0.7;
                " viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <button 
                class="btn btn-primary" 
                onclick="performSearch()" 
                style="width: 100%; margin-top: 1rem; padding: 16px;"
            >
                🔍 Search
            </button>
        </div>

        <!-- Results Section -->
        <div id="results-container" style="display: none;">
            <div class="glass-panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 id="results-title" style="margin: 0;">🔍 Searching...</h3>
                    <button class="btn btn-secondary" onclick="clearResults()" style="font-size: 0.9rem;">
                        🗑️ Clear
                    </button>
                </div>
                <div id="results-list"></div>
            </div>
        </div>

        <!-- No Results -->
        <div id="no-results" class="glass-panel" style="text-align: center; display: none;">
            <p style="color: var(--text-secondary); font-size: 1.1rem;">
                No results found. Try different keywords! 📝
            </p>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results-container');
        const resultsList = document.getElementById('results-list');
        const resultsTitle = document.getElementById('results-title');
        const noResults = document.getElementById('no-results');

        // Focus search on load
        searchInput.focus();

        // Enter key support
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) {
                searchInput.placeholder = 'Please enter a search term!';
                setTimeout(() => {
                    searchInput.placeholder = 'Search anything...';
                }, 2000);
                return;
            }

            console.log('🔍 Searching:', query);

            // Show loading
            resultsContainer.style.display = 'block';
            noResults.style.display = 'none';
            resultsTitle.textContent = '🔍 Searching the web...';
            resultsList.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-secondary);">Loading results...</div>';

            try {
                // Use DuckDuckGo Instant Answer API (CORS-friendly)
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://api.duckduckgo.com/?q=' + encodeURIComponent(query) + '&format=json&no_html=1&skip_disambig=1')}`);
                const data = await response.json();
                const duckData = JSON.parse(data.contents);

                displayResults(duckData, query);

            } catch (error) {
                console.error('Search error:', error);
                resultsList.innerHTML = `
                    <div style="text-align: center; padding: 2rem; color: var(--accent-pink);">
                        <p>⚠️ Search temporarily unavailable</p>
                        <p style="font-size: 0.9rem; opacity: 0.8;">This is a free service. Try again in a moment.</p>
                        <button class="btn btn-primary" onclick="window.open('https://duckduckgo.com/?q=${encodeURIComponent(query)}', '_blank')" style="margin-top: 1rem;">
                            Open in New Tab
                        </button>
                    </div>
                `;
            }
        }

        function displayResults(data, query) {
            console.log('📊 Raw results:', data);

            resultsTitle.textContent = `🔍 ${data.Heading || 'Search Results'} (${data.AbstractSource || 'Web'})`;

            if (data.Abstract || data.Answer) {
                // Instant Answer (top result)
                resultsList.innerHTML = `
                    <div style="
                        background: rgba(126, 184, 234, 0.1); 
                        border-left: 4px solid var(--accent-blue);
                        padding: 1.5rem;
                        margin-bottom: 1.5rem;
                        border-radius: 12px;
                    ">
                        <h4 style="color: var(--accent-blue); margin-bottom: 0.5rem;">📌 Instant Answer</h4>
                        <p style="line-height: 1.6; margin-bottom: 1rem;">${data.Abstract || data.Answer}</p>
                        ${data.AbstractSource ? `<small>Source: ${data.AbstractSource}</small>` : ''}
                    </div>
                `;
            }

            // Related Topics
            if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                const topicsHtml = data.RelatedTopics.slice(0, 6).map(topic => `
                    <div style="
                        padding: 1rem; 
                        border: 1px solid var(--glass-border); 
                        border-radius: 12px; 
                        margin-bottom: 1rem;
                        transition: all 0.3s ease;
                    " onmouseover="this.style.borderColor='var(--accent-blue)'" onmouseout="this.style.borderColor='var(--glass-border)'">
                        <h5 style="margin: 0 0 0.5rem 0; color: var(--accent-blue);">
                            ${topic.Text ? topic.Text.split(' - ')[0] : 'Topic'}
                        </h5>
                        <p style="margin: 0; color: var(--text-secondary); font-size: 0.95rem;">
                            ${topic.Text ? topic.Text.split(' - ').slice(1).join(' - ') : 'No description'}
                        </p>
                        ${topic.FirstURL ? 
                            `<a href="${topic.FirstURL}" target="_blank" style="
                                display: inline-block; 
                                margin-top: 0.5rem; 
                                color: var(--accent-pink); 
                                text-decoration: none; 
                                font-weight: 600;
                            ">🔗 Read more</a>` : ''
                        }
                    </div>
                `).join('');
                
                resultsList.innerHTML += `<h4 style="margin: 2rem 0 1rem 0; color: var(--accent-purple);">📋 Related Topics</h4>` + topicsHtml;
            } else {
                resultsList.innerHTML += `
                    <div style="text-align: center; padding: 2rem; color: var(--text-secondary);">
                        <p>No detailed results found</p>
                        <button class="btn btn-primary" onclick="window.open('https://duckduckgo.com/?q=${encodeURIComponent(query)}', '_blank')" style="margin-top: 1rem;">
                            🔗 Open DuckDuckGo
                        </button>
                    </div>
                `;
            }
        }

        function clearResults() {
            resultsContainer.style.display = 'none';
            noResults.style.display = 'none';
            searchInput.value = '';
            searchInput.focus();
        }
    </script>
</body>
</html>
