<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pomodoro - Student OS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="glass-panel" style="border-radius: 0 0 20px 20px; margin-bottom: 0;">
        <div class="logo">Student OS</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="pomodoro.html" class="active">Pomodoro</a>
            <a href="calculator.html">Calc</a>
            <a href="assistant.html">AI</a>
            <a href="search.html">Search</a>
            <a href="storage.html">Storage</a>
        </div>
    </nav>

    <div class="container" style="text-align: center; margin-top: 3rem;">
        <div class="glass-panel">
            <h2>Focus Timer</h2>
            <div class="timer-display" id="timer">25:00</div>
            
            <div style="display: flex; justify-content: center; gap: 10px;">
                <button class="btn btn-primary" onclick="startTimer()">Start</button>
                <button class="btn btn-secondary" onclick="pauseTimer()">Pause</button>
                <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
            </div>

            <div style="margin-top: 2rem;">
                <p>Completed Sessions: <span id="session-count" style="color: var(--accent-pink); font-weight: bold;">0</span></p>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const DEFAULT_TIME = 25 * 60; // 25 minutes in seconds
        const END_TIME_KEY = 'pomodoro_end_time'; // LocalStorage key for end timestamp
        const PAUSED_TIME_KEY = 'pomodoro_paused_time'; // Key for paused duration
        
        let timerId = null;
        const display = document.getElementById('timer');
        const countDisplay = document.getElementById('session-count');

        // Load session count
        let sessions = localStorage.getItem('pomodoro_sessions') || 0;
        countDisplay.innerText = sessions;

        // Initialize on page load
        window.onload = function() {
            checkTimerState();
        };

        function checkTimerState() {
            const endTime = localStorage.getItem(END_TIME_KEY);
            const pausedTime = localStorage.getItem(PAUSED_TIME_KEY);

            if (endTime) {
                // If there is an end time, the timer was running
                const now = Date.now();
                const timeLeft = Math.ceil((parseInt(endTime) - now) / 1000);

                if (timeLeft > 0) {
                    // Timer is still valid (hasn't finished while away)
                    updateDisplay(timeLeft);
                    startTimer(false); // false = don't overwrite LS, just resume loop
                } else {
                    // Timer finished while user was away/closed
                    handleComplete();
                }
            } else if (pausedTime) {
                // Timer was paused previously
                updateDisplay(parseInt(pausedTime));
            } else {
                // Fresh start
                updateDisplay(DEFAULT_TIME);
            }
        }

        function updateDisplay(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            // Also update document title so user can see time in tab
            document.title = `(${m}:${s}) Pomodoro - Student OS`;
        }

        function startTimer(isUserAction = true) {
            if (timerId) return; // Already running

            if (isUserAction) {
                // Calculate the timestamp when the timer should finish
                // We get current remaining time from display to be precise
                const currentTimeText = display.innerText;
                const [m, s] = currentTimeText.split(':').map(Number);
                const totalSeconds = m * 60 + s;
                
                if (totalSeconds <= 0) return;

                const endTime = Date.now() + (totalSeconds * 1000);
                
                // Save to LocalStorage
                localStorage.setItem(END_TIME_KEY, endTime);
                localStorage.removeItem(PAUSED_TIME_KEY);
            }

            // Start the interval
            timerId = setInterval(() => {
                const endTime = parseInt(localStorage.getItem(END_TIME_KEY));
                
                if (!endTime) {
                    pauseTimer();
                    return;
                }

                const now = Date.now();
                const timeLeft = Math.ceil((endTime - now) / 1000);

                if (timeLeft <= 0) {
                    // Time is up
                    clearInterval(timerId);
                    timerId = null;
                    updateDisplay(0);
                    handleComplete();
                } else {
                    updateDisplay(timeLeft);
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerId);
            timerId = null;

            // Calculate remaining time to save for later
            const endTime = localStorage.getItem(END_TIME_KEY);
            if (endTime) {
                const remaining = Math.ceil((parseInt(endTime) - Date.now()) / 1000);
                if (remaining > 0) {
                    localStorage.setItem(PAUSED_TIME_KEY, remaining);
                }
            }
            
            // Clear the running end time
            localStorage.removeItem(END_TIME_KEY);
        }

        function resetTimer() {
            pauseTimer();
            localStorage.removeItem(END_TIME_KEY);
            localStorage.removeItem(PAUSED_TIME_KEY);
            document.title = "Pomodoro - Student OS";
            updateDisplay(DEFAULT_TIME);
        }

        function handleComplete() {
            alert("Session Complete! Take a break.");
            
            // Increment session
            sessions = parseInt(sessions) + 1;
            localStorage.setItem('pomodoro_sessions', sessions);
            countDisplay.innerText = sessions;
            
            // Reset logic
            resetTimer();
        }
    </script>
</body>
</html>
