<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💾 File Storage - Student OS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">
            <i class="fas fa-hdd"></i>
            <span>File Storage</span>
        </div>
        <div class="nav-stats">
            <span id="storageStats">0/50MB (0%)</span>
            <button id="refreshBtn" title="Refresh">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="path-display">
                <span id="currentPath">/</span>
                <button id="backBtn" title="Go Up">
                    <i class="fas fa-level-up-alt"></i>
                </button>
            </div>
            <div class="file-tree" id="fileTree">
                <!-- Dynamic file tree will be populated here -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Toolbar -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <button id="newFileBtn" title="New File">
                        <i class="fas fa-file"></i> New File
                    </button>
                    <button id="newDirBtn" title="New Folder">
                        <i class="fas fa-folder"></i> New Folder
                    </button>
                    <button id="uploadBtn" title="Upload">
                        <i class="fas fa-upload"></i> Upload
                    </button>
                </div>
                <div class="toolbar-right">
                    <button id="downloadBtn" title="Download All">
                        <i class="fas fa-download"></i> Download
                    </button>
                    <button id="clearBtn" title="Clear All" class="danger">
                        <i class="fas fa-trash"></i> Clear
                    </button>
                </div>
            </div>

            <!-- File List -->
            <div class="file-grid" id="fileGrid">
                <!-- Files will be populated here -->
            </div>

            <!-- File Editor (Hidden by default) -->
            <div class="editor-container" id="editorContainer">
                <div class="editor-header">
                    <span id="editorFilename"></span>
                    <div class="editor-actions">
                        <button id="saveBtn" title="Save">
                            <i class="fas fa-save"></i>
                        </button>
                        <button id="deleteFileBtn" title="Delete" class="danger">
                            <i class="fas fa-trash"></i>
                        </button>
                        <button id="closeEditorBtn" title="Close">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <textarea id="fileEditor" placeholder="Edit your file content here..."></textarea>
            </div>
        </main>
    </div>

    <!-- New File Modal -->
    <div class="modal" id="newFileModal">
        <div class="modal-content">
            <h3>New File</h3>
            <input type="text" id="newFileName" placeholder="File name (e.g. document.txt)">
            <textarea id="newFileContent" placeholder="Initial content..."></textarea>
            <div class="modal-actions">
                <button id="createFileBtn">Create</button>
                <button id="cancelFileBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- New Directory Modal -->
    <div class="modal" id="newDirModal">
        <div class="modal-content">
            <h3>New Folder</h3>
            <input type="text" id="newDirName" placeholder="Folder name">
            <div class="modal-actions">
                <button id="createDirBtn">Create</button>
                <button id="cancelDirBtn">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Load Storage JS -->
    <script src="js/storage.js"></script>
    
    <!-- Main App Logic -->
    <script>
        class FileStorageApp {
            constructor() {
                this.drive = window.virtualDrive;
                this.init();
            }

            init() {
                this.bindEvents();
                this.refresh();
                this.updateStats();
            }

            bindEvents() {
                // Toolbar buttons
                document.getElementById('newFileBtn').onclick = () => this.showNewFileModal();
                document.getElementById('newDirBtn').onclick = () => this.showNewDirModal();
                document.getElementById('uploadBtn').onclick = () => this.handleUpload();
                document.getElementById('downloadBtn').onclick = () => this.handleDownload();
                document.getElementById('clearBtn').onclick = () => this.clearAll();
                document.getElementById('refreshBtn').onclick = () => this.refresh();

                // Navigation
                document.getElementById('backBtn').onclick = () => this.goUp();

                // Modals
                document.getElementById('createFileBtn').onclick = () => this.createFile();
                document.getElementById('cancelFileBtn').onclick = () => this.hideNewFileModal();
                document.getElementById('createDirBtn').onclick = () => this.createDir();
                document.getElementById('cancelDirBtn').onclick = () => this.hideNewDirModal();

                // Editor
                document.getElementById('saveBtn').onclick = () => this.saveFile();
                document.getElementById('deleteFileBtn').onclick = () => this.deleteCurrentFile();
                document.getElementById('closeEditorBtn').onclick = () => this.closeEditor();

                // Global click handler for file selection
                document.addEventListener('click', (e) => {
                    if (e.target.classList.contains('file-item')) {
                        this.openFile(e.target.dataset.filename);
                    }
                });
            }

            refresh() {
                this.renderFiles();
                this.updatePath();
                this.updateStats();
            }

            renderFiles() {
                const files = this.drive.list();
                const fileGrid = document.getElementById('fileGrid');
                fileGrid.innerHTML = files.map(file => `
                    <div class="file-item ${file.type === 'directory' ? 'directory' : ''}" 
                         data-filename="${file.name}" data-path="${file.path}">
                        <i class="fas ${file.type === 'directory' ? 'fa-folder' : 'fa-file'}"></i>
                        <span>${file.name}</span>
                        <small>${this.formatSize(file.size)}${file.type === 'directory' ? '' : ' • ' + this.formatDate(file.modified)}</small>
                    </div>
                `).join('');
            }

            updatePath() {
                document.getElementById('currentPath').textContent = this.drive.pwd();
            }

            updateStats() {
                const stats = this.drive.getStats();
                document.getElementById('storageStats').textContent = 
                    `${this.formatSize(stats.used)}/${this.formatSize(stats.total)} (${stats.usagePercent}%)`;
            }

            openFile(filename) {
                try {
                    const content = this.drive.readFile(filename);
                    document.getElementById('editorFilename').textContent = filename;
                    document.getElementById('fileEditor').value = content;
                    document.getElementById('editorContainer').classList.add('active');
                } catch (e) {
                    alert(e.message);
                }
            }

            saveFile() {
                const filename = document.getElementById('editorFilename').textContent;
                const content = document.getElementById('fileEditor').value;
                try {
                    this.drive.writeFile(filename, content);
                    this.refresh();
                    alert('File saved!');
                } catch (e) {
                    alert(e.message);
                }
            }

            deleteCurrentFile() {
                if (confirm('Delete this file?')) {
                    const filename = document.getElementById('editorFilename').textContent;
                    this.drive.deleteFile(filename);
                    this.closeEditor();
                    this.refresh();
                }
            }

            closeEditor() {
                document.getElementById('editorContainer').classList.remove('active');
            }

            goUp() {
                try {
                    this.drive.cd('..');
                    this.refresh();
                } catch (e) {
                    alert(e.message);
                }
            }

            showNewFileModal() {
                document.getElementById('newFileModal').classList.add('active');
            }

            hideNewFileModal() {
                document.getElementById('newFileModal').classList.remove('active');
                document.getElementById('newFileName').value = '';
                document.getElementById('newFileContent').value = '';
            }

            createFile() {
                const name = document.getElementById('newFileName').value.trim();
                const content = document.getElementById('newFileContent').value;
                if (!name) return alert('Please enter a filename');

                try {
                    this.drive.createFile(name, content);
                    this.hideNewFileModal();
                    this.refresh();
                } catch (e) {
                    alert(e.message);
                }
            }

            showNewDirModal() {
                document.getElementById('newDirModal').classList.add('active');
            }

            hideNewDirModal() {
                document.getElementById('newDirModal').classList.remove('active');
                document.getElementById('newDirName').value = '';
            }

            createDir() {
                const name = document.getElementById('newDirName').value.trim();
                if (!name) return alert('Please enter a folder name');

                try {
                    this.drive.mkdir(name);
                    this.hideNewDirModal();
                    this.refresh();
                } catch (e) {
                    alert(e.message);
                }
            }

            formatSize(bytes) {
                if (bytes === 0) return '0B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            }

            formatDate(timestamp) {
                return new Date(timestamp).toLocaleDateString();
            }

            async handleUpload() {
                const input = document.createElement('input');
                input.type = 'file';
                input.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (ev) => {
                            try {
                                this.drive.createFile(file.name, ev.target.result);
                                this.refresh();
                            } catch (err) {
                                alert(err.message);
                            }
                        };
                        reader.readAsText(file);
                    }
                };
                input.click();
            }

            async handleDownload() {
                try {
                    // Note: Requires JSZip library for full ZIP export
                    alert('ZIP export requires JSZip library. Files saved to localStorage.');
                } catch (e) {
                    alert('Download not available without JSZip');
                }
            }

            clearAll() {
                if (confirm('Delete ALL files? This cannot be undone!')) {
                    this.drive.clear();
                    this.refresh();
                }
            }
        }

        // Initialize app when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new FileStorageApp();
        });
    </script>
</body>
</html>
